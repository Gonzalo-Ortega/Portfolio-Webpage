<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://kit.fontawesome.com/ca8919fc1b.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="css/main.css">
  <title>Welcome to my portfolio</title>
</head>

<body>
  <div id="header"></div>
  
  <div class="page">
<div id="layout">
    <aside id="sidebar"></aside>
    <main id="content"></main>
  </div>
  <div id="footer"></div>
  </div>

<script>
    // Load shared components once
    fetch("header.html").then(r => r.text()).then(t => header.innerHTML = t);
    fetch("sidebar.html").then(r => r.text()).then(t => sidebar.innerHTML = t);
    fetch("footer.html").then(r => r.text()).then(t => footer.innerHTML = t);

    // Router function - loads only main content
    function loadPage(page) {
      fetch("pages/" + page + ".html")
        .then(r => r.text())
        .then(html => {
          document.getElementById("content").innerHTML = html;
        });
    }

    
// Handle hash change (navigation)
    window.addEventListener("hashchange", () => {
      let page = location.hash.replace("#", "") || "about";
      loadPage(page);
    });


    // Default page
    loadPage("about");
  </script>
</body>


  <script src="js/main.js"></script>
</body>

</html>
