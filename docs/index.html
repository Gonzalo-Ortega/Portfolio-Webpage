<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://kit.fontawesome.com/ca8919fc1b.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="css/main.css">

  <link rel="icon" type="image/svg+xml"
    href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="0.9em" font-size="90">🌱</text></svg>' />

  <title>Gonzalo Ortega</title>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Gonzalo Ortega",
    "image": "https://gonzaloortega.com/gonzalo-ortega-portrait.jpg",
    "jobTitle": "Mathematics PhD Student",
    "url": "https://gonzaloortega.com"
  }
  </script>

</head>

<body>
  <div id="header"></div>
  <div class="page">
    <div id="layout">
      <aside id="sidebar"></aside>
      <main id="content"></main>
    </div>
  </div>
  <div id="footer"></div>

  <script>
    // Load shared components once
    fetch("header.html").then(r => r.text()).then(t => {
      header.innerHTML = t;
      if (typeof initMenu === 'function') {
        initMenu();
      }
    });
    fetch("sidebar.html").then(r => r.text()).then(t => sidebar.innerHTML = t);
    fetch("footer.html").then(r => r.text()).then(t => footer.innerHTML = t);

    // Router function - loads only main content
    function loadPage(page) {
      fetch("pages/" + page + ".html")
        .then(r => r.text())
        .then(html => {
          document.getElementById("content").innerHTML = html;
        });
    }


    // Handle hash change (navigation)
    window.addEventListener("hashchange", () => {
      let page = location.hash.replace("#", "") || "about";
      loadPage(page);
      if (typeof updateCurrentPage === 'function') {
        updateCurrentPage();
      }
    });

    // Default page
    loadPage("about");
  </script>
</body>

<script src="js/main.js"></script>

</html>
