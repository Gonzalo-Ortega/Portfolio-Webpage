<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Redirecting…</title>

  <script>
    // Redirect all unknown routes to index.html and preserve the path
    const redirectTo = '/index.html?redirect=' + encodeURIComponent(window.location.pathname);
    window.location.replace(redirectTo);
  </script>
</head>

<body></body>

</html>
